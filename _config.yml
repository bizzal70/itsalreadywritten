title: "It's Already Written."
tagline: "The rules are already written."
description: "TTRPG rules, facts, and news — for people who actually read the book."
url: "https://bizzal70.github.io"
baseurl: "/itsalreadywritten"

author:
  name: "The Editor"

permalink: /:year/:month/:day/:title/

markdown: kramdown
highlighter: rouge

twitter:
  username: ItsAlrdyWritten

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - scraper/
  - README.md
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-card.png
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
