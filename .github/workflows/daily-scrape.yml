name: Daily Scrape

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC daily, ahead of the Field Note run
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "content"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Scrape news + social
        run: python scraper/scraper.py
      - name: Commit store
        run: |
          git config user.name "itsalreadywritten-bot"
          git config user.email "actions@github.com"
          git add scraper/articles.db
          if git diff --staged --quiet; then
            echo "No store changes."
          else
            git commit -m "Scrape $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
