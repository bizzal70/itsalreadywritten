name: Weekly RTFM

on:
  schedule:
    - cron: "0 15 * * 3"   # Wednesdays 15:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "content"
  cancel-in-progress: false

jobs:
  rtfm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # PAT so the post push triggers deploy + tweet
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Scrape (catch up)
        run: python scraper/scraper.py
      - name: Generate RTFM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/rtfm.py
      - name: Commit and push
        run: |
          git config user.name "itsalreadywritten-bot"
          git config user.email "actions@github.com"
          git add _posts/ scraper/articles.db scraper/state/published_rtfm.json
          if git diff --staged --quiet; then
            echo "No RTFM this week (no 3+ atom cluster available)."
          else
            git commit -m "RTFM $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
