name: X post on new issue

on:
  push:
    branches: [main]
    paths:
      - '_posts/**.md'

jobs:
  x-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new post (added files only)
        id: post
        run: |
          new_post=$(git diff --diff-filter=A --name-only HEAD~1 HEAD -- '_posts/*.md' | head -1)
          echo "path=$new_post" >> "$GITHUB_OUTPUT"
          echo "[x-post] new post: ${new_post:-none}"

      - name: Set up Python
        if: steps.post.outputs.path != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.post.outputs.path != ''
        run: |
          sudo apt-get install -y --no-install-recommends fonts-dejavu-core
          pip install Pillow PyYAML tweepy

      - name: Generate thumbnail
        if: steps.post.outputs.path != ''
        run: |
          python bin/x_thumbnail.py \
            --blog written \
            --post "${{ steps.post.outputs.path }}" \
            --out /tmp/x_card.png

      - name: Build tweet text
        if: steps.post.outputs.path != ''
        id: tweet
        run: |
          python bin/x_build_tweet.py \
            --post "${{ steps.post.outputs.path }}" \
            --url "https://bizzal70.github.io/itsalreadywritten"

      - name: Post to X
        if: steps.post.outputs.path != ''
        env:
          X_API_KEY: ${{ secrets.X_WRITTEN_API_KEY }}
          X_API_SECRET: ${{ secrets.X_WRITTEN_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_WRITTEN_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_WRITTEN_ACCESS_TOKEN_SECRET }}
        run: |
          python bin/x_post.py \
            --image /tmp/x_card.png \
            --text "${{ steps.tweet.outputs.text }}"
